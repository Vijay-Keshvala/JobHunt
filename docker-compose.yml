services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: jobhunt
      MYSQL_USER: jobhunt
      MYSQL_PASSWORD: jobhunt
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_KEY: ${APP_KEY:?Set APP_KEY in .env next to this file}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: jobhunt
      DB_USERNAME: jobhunt
      DB_PASSWORD: jobhunt
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
